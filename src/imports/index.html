<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creator Hub UI Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Caveat:wght@600;700&family=Kalam:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f6f1e8;
      --paper: #fffdf9;
      --paper-tint: #f4efe6;
      --ink: #172033;
      --ink-soft: #4f5c71;
      --ink-faint: #7d899c;
      --rule: #d9cfbe;
      --rule-soft: #ebe4d7;
      --orange: #ea6a21;
      --orange-soft: #ffe4d2;
      --blue: #2b67d8;
      --blue-soft: #dbe8ff;
      --green: #1f9d5c;
      --green-soft: #def6e8;
      --red: #d23b3b;
      --red-soft: #ffe3e3;
      --amber: #c1840b;
      --slate: #141d2d;
      --ui: "Plus Jakarta Sans", sans-serif;
      --hand: "Caveat", cursive;
      --hand2: "Kalam", cursive;
      color-scheme: light;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--ui);
      color: var(--ink);
      background:
        radial-gradient(circle at top right, #ffe0c4 0, transparent 28%),
        linear-gradient(180deg, #fff9f1 0%, var(--bg) 100%);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(10px);
      background: rgba(255, 249, 241, 0.88);
      border-bottom: 1px solid var(--rule-soft);
      padding: 18px 20px;
    }

    .topbar-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: var(--ink);
      color: white;
      font-weight: 800;
    }

    .brand-copy h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.1;
    }

    .brand-copy p {
      margin: 3px 0 0;
      color: var(--ink-faint);
      font-size: 12px;
    }

    .jump-links {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .jump-links a {
      text-decoration: none;
      color: var(--ink);
      border: 1.5px solid var(--rule);
      background: white;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 28px 20px 80px;
    }

    .screen-block {
      margin-bottom: 44px;
      scroll-margin-top: 100px;
    }

    .page-header {
      margin-bottom: 18px;
    }

    .page-title {
      margin: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 28px;
      letter-spacing: -0.03em;
    }

    .num {
      display: inline-grid;
      place-items: center;
      min-width: 44px;
      height: 44px;
      border-radius: 14px;
      background: var(--ink);
      color: white;
      font-size: 16px;
      font-weight: 800;
    }

    .page-sub {
      margin-top: 10px;
      max-width: 860px;
      color: var(--ink-soft);
      line-height: 1.5;
      font-size: 14px;
    }

    .variations {
      display: grid;
      gap: 26px;
    }

    .variation {
      background: rgba(255, 255, 255, 0.72);
      border: 1.5px solid var(--rule);
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 18px 40px rgba(23, 32, 51, 0.06);
      overflow: hidden;
    }

    .var-label {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .var-num {
      font-size: 12px;
      font-weight: 800;
      color: var(--orange);
      letter-spacing: 0.08em;
    }

    .var-name {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .var-desc {
      margin-bottom: 18px;
      font-size: 13px;
      line-height: 1.55;
      color: var(--ink-soft);
      max-width: 920px;
    }

    .phone-stage, .desktop-frame, .matrix, .legend {
      position: relative;
    }

    .phone-stage {
      min-height: 760px;
      display: grid;
      place-items: center;
      padding: 12px 0;
    }

    .phone {
      width: 344px;
      background: #101725;
      border-radius: 36px;
      padding: 11px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.18);
    }

    .phone-screen {
      background: white;
      border-radius: 26px;
      min-height: 690px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 18px 8px;
      font-size: 11px;
      font-weight: 700;
    }

    .status-bar .right {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .desktop-frame {
      border: 1.5px solid var(--rule);
      border-radius: 20px;
      background: #f7f2e8;
      overflow: hidden;
      box-shadow: 0 18px 42px rgba(23, 32, 51, 0.08);
    }

    .desktop-chrome {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--rule);
      background: #fffaf3;
    }

    .dots {
      display: flex;
      gap: 6px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #d9cfbe;
    }

    .url {
      flex: 1;
      min-width: 0;
      padding: 7px 12px;
      border-radius: 999px;
      background: white;
      border: 1px solid var(--rule-soft);
      color: var(--ink-faint);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .os-shell {
      display: flex;
      min-height: 680px;
    }

    .os-sidebar {
      width: 230px;
      background: var(--slate);
      color: white;
      padding: 18px 14px;
      display: flex;
      flex-direction: column;
    }

    .os-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }

    .os-brand-mark {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: var(--orange);
      font-weight: 800;
    }

    .os-brand-name {
      font-size: 16px;
      font-weight: 800;
    }

    .os-nav-section {
      margin: 16px 8px 8px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      opacity: 0.45;
      font-weight: 700;
    }

    .os-nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 12px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.78);
      margin-bottom: 4px;
    }

    .os-nav-item.active {
      background: rgba(255, 255, 255, 0.12);
      color: white;
    }

    .os-nav-item .ico {
      width: 18px;
      height: 18px;
      border: 1.5px solid currentColor;
      border-radius: 5px;
      opacity: 0.9;
    }

    .os-main {
      flex: 1;
      min-width: 0;
      background: #fffaf2;
      display: flex;
      flex-direction: column;
    }

    .os-topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--rule);
      background: rgba(255,255,255,0.8);
    }

    .crumbs {
      font-size: 12px;
      color: var(--ink-soft);
    }

    .spacer { flex: 1; }
    .os-content { padding: 20px; }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border-radius: 999px;
      padding: 5px 9px;
      border: 1px solid var(--rule);
      background: white;
      color: var(--ink);
      font-size: 10px;
      font-weight: 700;
      line-height: 1;
    }

    .pill.ghost { background: transparent; }
    .pill.orange, .orange { background: var(--orange-soft); border-color: var(--orange); color: var(--orange); }
    .pill.blue, .blue { background: var(--blue-soft); border-color: var(--blue); color: var(--blue); }
    .pill.green, .green { background: var(--green-soft); border-color: var(--green); color: var(--green); }
    .pill.red, .red { background: var(--red-soft); border-color: var(--red); color: var(--red); }
    .pill.amber, .amber { background: #fff1cf; border-color: var(--amber); color: var(--amber); }

    .box {
      background: white;
      border: 1.5px solid var(--rule);
      border-radius: 12px;
    }

    .ph {
      border: 1.5px dashed var(--rule);
      border-radius: 12px;
      background:
        linear-gradient(135deg, rgba(234,106,33,0.08) 0, rgba(234,106,33,0.08) 25%, transparent 25%, transparent 50%, rgba(234,106,33,0.08) 50%, rgba(234,106,33,0.08) 75%, transparent 75%, transparent 100%),
        #fbf7ef;
      background-size: 16px 16px;
      position: relative;
      overflow: hidden;
    }

    .ph-label {
      display: inline-block;
      background: rgba(255,255,255,0.9);
      border: 1px solid var(--rule);
      border-radius: 999px;
      padding: 3px 7px;
      font-size: 9px;
      color: var(--ink-faint);
      font-weight: 700;
    }

    .line {
      height: 8px;
      border-radius: 999px;
      background: #e8dfd1;
    }

    .line.thin {
      height: 6px;
    }

    .annot {
      position: absolute;
      font-family: var(--hand2);
      color: var(--orange);
      font-size: 18px;
      line-height: 1.1;
      z-index: 4;
      pointer-events: none;
    }

    .annot.ink { color: var(--ink-soft); }
    .annot.blue { color: var(--blue); }
    .annot.green { color: var(--green); }

    .arrow {
      position: absolute;
      overflow: visible;
    }

    .reset-btn {
      margin-top: 14px;
      border: 1.5px solid var(--rule);
      background: white;
      color: var(--ink);
      padding: 8px 12px;
      border-radius: 999px;
      font-family: var(--ui);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .swipe-anim-card {
      transition: transform 0.35s ease, opacity 0.35s ease;
    }

    .gone-left {
      transform: translateX(-130%) rotate(-14deg);
      opacity: 0;
    }

    .gone-right {
      transform: translateX(130%) rotate(14deg);
      opacity: 0;
    }

    .toast {
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%) translateY(-14px);
      background: var(--ink);
      color: white;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      opacity: 0;
      transition: all 0.2s ease;
      pointer-events: none;
      z-index: 30;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .matrix {
      display: grid;
      gap: 16px;
    }

    .matrix-row {
      border: 1.5px solid var(--rule);
      border-radius: 18px;
      background: rgba(255,255,255,0.82);
      overflow: hidden;
    }

    .matrix-header {
      padding: 16px 18px;
      border-bottom: 1px solid var(--rule-soft);
    }

    .matrix-header .ttl {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .matrix-header .sub {
      margin-top: 4px;
      font-size: 13px;
      color: var(--ink-soft);
    }

    .matrix-body {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 0;
    }

    .state-cell {
      padding: 18px;
      min-height: 220px;
      border-right: 1px solid var(--rule-soft);
      display: flex;
      flex-direction: column;
      gap: 14px;
      justify-content: space-between;
    }

    .state-cell:last-child { border-right: 0; }
    .state-num { color: var(--orange); font-weight: 800; font-size: 12px; }
    .state-label { font-weight: 800; font-size: 16px; }
    .state-demo { min-height: 96px; display: grid; place-items: center; }
    .state-note { font-size: 12px; color: var(--ink-soft); line-height: 1.45; }

    .legend {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }

    .legend > div {
      border: 1.5px solid var(--rule);
      border-radius: 16px;
      background: rgba(255,255,255,0.82);
      padding: 16px;
    }

    .legend h4 {
      margin: 0 0 8px;
      font-size: 14px;
    }

    .legend p {
      margin: 0;
      font-size: 12px;
      line-height: 1.5;
      color: var(--ink-soft);
    }

    .swatch-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    @media (max-width: 1100px) {
      .matrix-body, .legend { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .os-sidebar { display: none; }
    }

    @media (max-width: 760px) {
      main { padding: 20px 12px 56px; }
      .variation { padding: 14px; border-radius: 18px; }
      .phone-stage { min-height: auto; }
      .phone { width: min(100%, 344px); }
      .page-title { font-size: 22px; }
      .matrix-body, .legend { grid-template-columns: 1fr; }
      .state-cell { border-right: 0; border-bottom: 1px solid var(--rule-soft); }
      .state-cell:last-child { border-bottom: 0; }
      .annot { display: none; }
      .jump-links { width: 100%; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="brand-mark">CH</div>
        <div class="brand-copy">
          <h1>Creator Hub UI Preview</h1>
          <p>Local static preview for all mobile and desktop explorations</p>
        </div>
      </div>
      <nav class="jump-links">
        <a href="#page-a1">A1</a>
        <a href="#page-a2">A2</a>
        <a href="#page-a3">A3</a>
        <a href="#page-b1">B1</a>
        <a href="#page-b2">B2</a>
        <a href="#page-b3">B3</a>
        <a href="#page-states">States</a>
      </nav>
    </div>
  </header>

  <main>
    <section id="page-a1" class="screen-block"></section>
    <section id="page-a2" class="screen-block"></section>
    <section id="page-a3" class="screen-block"></section>
    <section id="page-b1" class="screen-block"></section>
    <section id="page-b2" class="screen-block"></section>
    <section id="page-b3" class="screen-block"></section>
    <section id="page-states" class="screen-block"></section>
  </main>

  <script src="screens/b-shared.js"></script>
  <script src="screens/a1.js"></script>
  <script src="screens/a2.js"></script>
  <script src="screens/a3.js"></script>
  <script src="screens/b1.js"></script>
  <script src="screens/b2.js"></script>
  <script src="screens/b3.js"></script>
  <script src="screens/states.js"></script>
</body>
</html>
